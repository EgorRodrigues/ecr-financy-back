version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: ecr-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=financy_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecr_financy"]
      interval: 10s
      timeout: 5s
      retries: 20
