version: "3.9"
services:
  app:
    build: .
    container_name: ecr-backend
    ports:
      - "8000:8000"
    environment:
      - APP_POSTGRES_HOST=postgres
      - APP_POSTGRES_PORT=5432
      - APP_POSTGRES_DATABASE=financy_db
      - APP_POSTGRES_USERNAME=postgres
      - APP_POSTGRES_PASSWORD=postgres
      - APP_ENVIRONMENT=dev
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

  postgres:
    image: postgres:16
    container_name: ecr-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=financy_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financy_db"]
      interval: 10s
      timeout: 5s
      retries: 20
