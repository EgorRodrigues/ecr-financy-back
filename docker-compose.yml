version: "3.9"
services:
  cassandra:
    image: cassandra:4.1
    container_name: ecr-cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=ecr-cluster
      - CASSANDRA_NUM_TOKENS=128
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 10s
      timeout: 5s
      retries: 20
